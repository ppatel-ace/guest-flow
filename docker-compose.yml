version: '3.8'

services:
  app:
    image: guestflow-guestflow:latest
    build: .
    container_name: guestflow-app
    restart: always
    # host networking lets the container reach LAN devices (e.g. the label
    # printer on WiFi) without Docker NAT getting in the way.
    # The app listens on PORT (6055) directly on the host — nginx proxies there.
    network_mode: host
    environment:
      NODE_ENV: production
      # Must match the host port nginx proxies to (was 6055:5000 before host mode)
      PORT: 6055
      DATABASE_URL: ${DATABASE_URL}
      SESSION_SECRET: ${SESSION_SECRET:-change_this_to_a_long_random_secret}
      FINGERPRINT_HMAC_SECRET: ${FINGERPRINT_HMAC_SECRET:-}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:-}
      VITE_TURNSTILE_SITE_KEY: ${VITE_TURNSTILE_SITE_KEY:-}
      # SSO — must match the value set in the ace-auth service.
      SSO_JWT_SECRET: ${SSO_JWT_SECRET:-}
      # Public URL of the ace-auth login page, e.g. https://sso.aceelectronics.com
      SSO_LOGIN_URL: ${SSO_LOGIN_URL:-}
      APP_URL: ${APP_URL:-https://guestflow.aceelectronics.com}
      JOBTRACK_DATABASE_URL: ${JOBTRACK_DATABASE_URL:-}
      # Parent domain used when setting / clearing the shared ace_sso cookie.
      APP_DOMAIN: ${APP_DOMAIN:-}
      # Microsoft Graph API — check-in email notifications (GCC High)
      EMAIL_FROM: ${EMAIL_FROM:-no-reply@aceelectronics.com}
      EMAIL_TENANT_ID: ${EMAIL_TENANT_ID:-}
      EMAIL_CLIENT_ID: ${EMAIL_CLIENT_ID:-}
      EMAIL_CLIENT_SECRET: ${EMAIL_CLIENT_SECRET:-}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-ACE Guest Check-In}
      # Azure AD group that gates GuestFlow dashboard access
      GUESTFLOW_GROUP_ID: ${GUESTFLOW_GROUP_ID:-}
      # Brother QL label printer — set to the printer's WiFi IP address
      LABEL_PRINTER_IP: ${LABEL_PRINTER_IP:-}
      LABEL_PRINTER_PORT: ${LABEL_PRINTER_PORT:-9100}
      # Label media (default: 29×90 mm die-cut / DK-11201)
      LABEL_WIDTH_MM: ${LABEL_WIDTH_MM:-29}
      LABEL_LENGTH_MM: ${LABEL_LENGTH_MM:-90}
      LABEL_DIE_CUT: ${LABEL_DIE_CUT:-true}
