services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: guestflow
      POSTGRES_PASSWORD: guestflow_pass
      POSTGRES_DB: guestflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guestflow -d guestflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "6055:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://guestflow:guestflow_pass@db:5432/guestflow
      PGHOST: db
      PGPORT: 5432
      PGUSER: guestflow
      PGPASSWORD: guestflow_pass
      PGDATABASE: guestflow
      SESSION_SECRET: change_this_to_a_long_random_secret
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
