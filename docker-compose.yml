version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: guestflow-db
    restart: always
    environment:
      POSTGRES_USER: guestflow
      POSTGRES_PASSWORD: guestflow_pass
      POSTGRES_DB: guestflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      guestflow_net:
        ipv4_address: 10.50.30.3
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guestflow -d guestflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: guestflow-guestflow:latest
    build: .
    container_name: guestflow-app
    restart: always
    ports:
      - "6055:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://guestflow:guestflow_pass@10.50.30.3:5432/guestflow
      PGHOST: 10.50.30.3
      PGPORT: 5432
      PGUSER: guestflow
      PGPASSWORD: guestflow_pass
      PGDATABASE: guestflow
      SESSION_SECRET: change_this_to_a_long_random_secret
      FINGERPRINT_HMAC_SECRET: change_this_to_a_long_random_secret
      TURNSTILE_SECRET_KEY: ""
      VITE_TURNSTILE_SITE_KEY: ""
    networks:
      guestflow_net:
        ipv4_address: 10.50.30.2
    depends_on:
      db:
        condition: service_healthy

networks:
  guestflow_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.50.30.0/24
          gateway: 10.50.30.1

volumes:
  postgres_data:
