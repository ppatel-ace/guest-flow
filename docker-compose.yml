version: '3.8'

services:
  app:
    image: guestflow-guestflow:latest
    build: .
    container_name: guestflow-app
    restart: always
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: ${DATABASE_URL}
      SESSION_SECRET: ${SESSION_SECRET:-change_this_to_a_long_random_secret}
      FINGERPRINT_HMAC_SECRET: ${FINGERPRINT_HMAC_SECRET:-change_this_to_a_long_random_secret}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:-}
      VITE_TURNSTILE_SITE_KEY: ${VITE_TURNSTILE_SITE_KEY:-}
    networks:
      guestflow_net:
        ipv4_address: 172.28.11.2

  nginx:
    image: nginx:alpine
    container_name: guestflow-nginx
    restart: always
    ports:
      - "6055:80"
    command:
      - /bin/sh
      - -c
      - |
        printf 'upstream guestflow_app {\n    server app:5000;\n}\nserver {\n    listen 80;\n    server_name _;\n    client_max_body_size 20M;\n    location / {\n        proxy_pass http://guestflow_app;\n        proxy_http_version 1.1;\n        proxy_set_header Upgrade $$http_upgrade;\n        proxy_set_header Connection upgrade;\n        proxy_set_header Host $$host;\n        proxy_set_header X-Real-IP $$remote_addr;\n        proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;\n        proxy_set_header X-Forwarded-Proto $$scheme;\n        proxy_cache_bypass $$http_upgrade;\n        proxy_read_timeout 90s;\n    }\n}\n' > /etc/nginx/conf.d/default.conf
        nginx -g 'daemon off;'
    depends_on:
      - app
    networks:
      guestflow_net:
        ipv4_address: 172.28.11.3

networks:
  guestflow_net:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: br-guestflow
    ipam:
      config:
        - subnet: 172.28.11.0/24
          gateway: 172.28.11.1
